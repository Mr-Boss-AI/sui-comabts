<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#15191f;font-family:"Poppins";color:#e8e2d4;}
  .wrap{padding:24px;display:flex;flex-direction:column;gap:6px;}
  .row{display:flex;align-items:center;gap:10px;}
  .bar{background:#c89a3f;height:18px;border:2px solid #e8e2d4;border-radius:4px;}
  .lbl{font-family:"JetBrains Mono";font-size:11px;font-weight:700;color:#e8e2d4;min-width:90px;}
  .use{font-size:12px;color:#8a8474;}
</style></head><body>
<div class="wrap">
  <div class="row"><span class="lbl">s-1 · 4 px</span><div class="bar" style="width:4px"></div><span class="use">Tight insets</span></div>
  <div class="row"><span class="lbl">s-2 · 8 px</span><div class="bar" style="width:8px"></div><span class="use">Pill padding · stat-row gap</span></div>
  <div class="row"><span class="lbl">s-3 · 12 px</span><div class="bar" style="width:12px"></div><span class="use">Card inner row gap</span></div>
  <div class="row"><span class="lbl">s-4 · 16 px</span><div class="bar" style="width:16px"></div><span class="use">Default content gap</span></div>
  <div class="row"><span class="lbl">s-5 · 24 px</span><div class="bar" style="width:24px"></div><span class="use">Card padding · section gap</span></div>
  <div class="row"><span class="lbl">s-6 · 32 px</span><div class="bar" style="width:32px"></div><span class="use">Between major sections</span></div>
  <div class="row"><span class="lbl">s-7 · 48 px</span><div class="bar" style="width:48px"></div><span class="use">Page top / bottom padding</span></div>
  <div class="row"><span class="lbl">s-8 · 64 px</span><div class="bar" style="width:64px"></div><span class="use">Hero block padding</span></div>
</div>
</body></html>
