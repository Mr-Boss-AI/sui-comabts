<!doctype html>
<html><head><meta charset="utf-8"><title>Item Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0d12;font-family:"Poppins";color:#e8e2d4;}
  .wrap{padding:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .item{border:2px solid #e8e2d4;border-radius:12px;box-shadow:4px 4px 0 0 #000;background:#15191f;overflow:hidden;}
  .art{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;background:#15191f;border-bottom:2px solid #e8e2d4;position:relative;}
  .art img{width:90%;height:90%;object-fit:contain;image-rendering:auto;}
  .rar{position:absolute;top:8px;left:8px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:999px;background:#0a0d12;color:#e8e2d4;border:1.5px solid #8a8474;}
  .rar.leg{background:#c89a3f;color:#0a0d12;}
  .rar.rar{background:#3a6a9a;color:#e8e2d4;border-color:#3a6a9a;}
  .rar.epic{background:#7a3a8a;color:#e8e2d4;border-color:#7a3a8a;}
  .meta{padding:10px 12px;}
  .name{font-weight:800;font-size:14px;letter-spacing:-0.01em;margin-bottom:2px;line-height:1.2;}
  .sub{font-size:11px;color:#8a8474;}
  .row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
  .price{font-family:"JetBrains Mono";font-weight:700;font-size:13px;}
  .buy{font-family:"Poppins";font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;background:#b53d2c;color:#e8e2d4;border:1.5px solid #8a8474;border-radius:8px;padding:5px 12px;box-shadow:2px 2px 0 0 #000;}
</style></head><body>
<div class="wrap">
  <div class="item">
    <div class="art"><span class="rar leg">Legendary</span><img src="../assets/items/Skullcrusher_Maul.png" alt=""></div>
    <div class="meta"><div class="name">Skullcrusher Maul</div><div class="sub">2H · STR +6 / END +2</div>
      <div class="row"><span class="price">0.750 SUI</span><button class="buy">Buy</button></div>
    </div>
  </div>
  <div class="item">
    <div class="art"><span class="rar epic">Epic</span><img src="../assets/items/Bloodletter_Gauntlets.png" alt=""></div>
    <div class="meta"><div class="name">Bloodletter Gauntlets</div><div class="sub">Gloves · STR +3 / INT +1</div>
      <div class="row"><span class="price">0.210 SUI</span><button class="buy">Buy</button></div>
    </div>
  </div>
  <div class="item">
    <div class="art"><span class="rar rar">Rare</span><img src="../assets/items/Phantom_Loop.png" alt=""></div>
    <div class="meta"><div class="name">Phantom Loop</div><div class="sub">Ring · DEX +2</div>
      <div class="row"><span class="price">0.045 SUI</span><button class="buy">Buy</button></div>
    </div>
  </div>
</div>
</body></html>
