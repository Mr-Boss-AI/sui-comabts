<!doctype html>
<html><head><meta charset="utf-8"><title>Rarity Ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#15191f;font-family:"Poppins",sans-serif;}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .r{border:2px solid #e8e2d4;border-radius:10px;overflow:hidden;box-shadow:3px 3px 0 0 #000;background:#15191f;text-align:center;}
  .chip{height:54px;display:flex;align-items:center;justify-content:center;}
  .pill{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:999px;background:#15191f;color:#e8e2d4;border:1.5px solid #8a8474;}
  .pill.on-light{background:#0a0d12;color:#e8e2d4;border-color:#e8e2d4;}
  .name{font-weight:800;font-size:12px;padding:8px 0 2px;}
  .hex{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:10px;color:#8a8474;padding-bottom:8px;}
</style></head><body>
<div class="wrap">
  <div class="r"><div class="chip" style="background:#9a958a"><span class="pill on-light">Common</span></div><div class="name">Common</div><div class="hex">#9a958a</div></div>
  <div class="r"><div class="chip" style="background:#5a8a3a"><span class="pill on-light">Uncommon</span></div><div class="name">Uncommon</div><div class="hex">#5a8a3a</div></div>
  <div class="r"><div class="chip" style="background:#3a6a9a"><span class="pill on-light">Rare</span></div><div class="name">Rare</div><div class="hex">#3a6a9a</div></div>
  <div class="r"><div class="chip" style="background:#7a3a8a"><span class="pill on-light">Epic</span></div><div class="name">Epic</div><div class="hex">#7a3a8a</div></div>
  <div class="r"><div class="chip" style="background:#c89a3f"><span class="pill">Legendary</span></div><div class="name">Legendary</div><div class="hex">#c89a3f</div></div>
  <div class="r"><div class="chip" style="background:#b53d2c"><span class="pill on-light">Mythic</span></div><div class="name">Mythic</div><div class="hex">#b53d2c</div></div>
</div>
</body></html>
