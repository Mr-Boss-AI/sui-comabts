<!doctype html>
<html><head><meta charset="utf-8"><title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#15191f;}
  .wrap{padding:24px;display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
  .label{font-family:"Poppins";font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#8a8474;}
  .display{font-family:"Slackey";font-size:96px;line-height:1;color:#e8e2d4;letter-spacing:0;margin:0;}
  .display .red{color:#b53d2c;}
  .row{display:flex;gap:24px;align-items:baseline;}
  .splash{font-family:"Slackey";font-size:64px;line-height:1;}
  .meta{font-family:"JetBrains Mono",monospace;font-size:11px;color:#8a8474;}
</style></head><body>
<div class="wrap">
  <span class="label">Slackey · Display · 96px / 64px · for wordmark + FIGHT splash</span>
  <h1 class="display">SUI<span class="red">COMBATS</span></h1>
  <div class="row">
    <span class="splash" style="color:#b53d2c">FIGHT!</span>
    <span class="splash" style="color:#c89a3f">WIN!</span>
    <span class="splash" style="color:#e8e2d4">KO!</span>
    <span class="splash" style="color:#e8e2d4">GG</span>
  </div>
  <span class="meta">font-family: "Slackey"; font-weight: 400; only one weight exists.</span>
</div>
</body></html>
