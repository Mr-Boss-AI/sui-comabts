<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#15191f;font-family:"Poppins";color:#e8e2d4;}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .s{height:88px;background:#15191f;border:2px solid #e8e2d4;box-shadow:4px 4px 0 0 #000;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono";font-weight:700;font-size:13px;}
  .lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#8a8474;text-align:center;margin-top:6px;}
</style></head><body>
<div class="wrap">
  <div><div class="s" style="border-radius:6px;">6 px</div><div class="lbl">Input / small pill</div></div>
  <div><div class="s" style="border-radius:8px;">8 px</div><div class="lbl">Chip / badge</div></div>
  <div><div class="s" style="border-radius:12px;">12 px · canonical</div><div class="lbl">Card / button / modal</div></div>
  <div><div class="s" style="border-radius:999px;">999 px</div><div class="lbl">Capsule / stamp</div></div>
</div>
</body></html>
