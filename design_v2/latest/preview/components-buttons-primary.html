<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#15191f;font-family:"Poppins";color:#e8e2d4;}
  .wrap{padding:24px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;}
  .btn{font-family:"Poppins";font-weight:700;text-transform:uppercase;letter-spacing:.05em;border:2px solid #e8e2d4;border-radius:12px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:transform .2s cubic-bezier(0.34,1.56,0.64,1),box-shadow .2s;}
  .btn:hover{transform:translate(-1px,-1px) rotate(-1deg);box-shadow:6px 6px 0 0 #000;}
  .btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 0 #000;}
  .red{background:#b53d2c;color:#e8e2d4;padding:14px 32px;font-size:18px;box-shadow:4px 4px 0 0 #000;}
  .yellow{background:#c89a3f;color:#0a0d12;padding:14px 32px;font-size:18px;box-shadow:4px 4px 0 0 #000;}
  .lg{padding:18px 40px;font-size:22px;box-shadow:6px 6px 0 0 #000;}
  .sm{padding:8px 18px;font-size:13px;box-shadow:3px 3px 0 0 #000;}
  .meta{width:100%;font-family:"JetBrains Mono";font-size:10px;color:#8a8474;margin-top:8px;}
</style></head><body>
<div class="wrap">
  <button class="btn red lg">⚔ Fight Now</button>
  <button class="btn yellow lg">Lock In</button>
  <br>
  <button class="btn red">Buy 0.5 SUI</button>
  <button class="btn yellow">Select</button>
  <button class="btn red sm">Accept Wager</button>
  <button class="btn yellow sm">Ready</button>
  <p class="meta">Red = commit / attack / pay. Yellow = select / OK / ready. 12px radius, 2px black border, flat 4-6px sticker shadow.</p>
</div>
</body></html>
