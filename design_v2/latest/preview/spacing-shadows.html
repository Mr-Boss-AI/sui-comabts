<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#15191f;font-family:"Poppins";color:#e8e2d4;}
  .wrap{padding:28px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
  .s{height:78px;background:#15191f;border:2px solid #e8e2d4;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono";font-weight:700;font-size:11px;color:#e8e2d4;text-align:center;padding:0 8px;}
  .lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#8a8474;text-align:center;margin-top:10px;}
</style></head><body>
<div class="wrap">
  <div><div class="s" style="box-shadow:2px 2px 0 0 #000;">2 2 0 ink</div><div class="lbl">Sticker-sm — small chrome</div></div>
  <div><div class="s" style="box-shadow:4px 4px 0 0 #000;">4 4 0 ink</div><div class="lbl">Sticker — default</div></div>
  <div><div class="s" style="box-shadow:6px 6px 0 0 #000;">6 6 0 ink</div><div class="lbl">Sticker-lg — hero card</div></div>
  <div><div class="s" style="box-shadow:4px 4px 0 0 #b53d2c;">4 4 0 red</div><div class="lbl">Sticker-red — focus / wager</div></div>
</div>
</body></html>
