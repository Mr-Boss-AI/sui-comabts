<!doctype html>
<html><head><meta charset="utf-8"><title>Hero Scrap</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#c89a3f;font-family:"Poppins";color:#e8e2d4;overflow:hidden;}
  .wrap{position:relative;padding:24px 24px 32px;min-height:220px;}
  .wm{font-family:"Slackey";font-size:128px;line-height:.85;letter-spacing:-0.01em;color:#e8e2d4;position:relative;z-index:1;}
  .wm .red{color:#b53d2c;-webkit-text-stroke:4px #e8e2d4;}
  .fighter{position:absolute;right:20px;top:0;bottom:0;width:200px;display:flex;align-items:center;justify-content:center;z-index:2;}
  .fighter img{width:200px;height:auto;filter:drop-shadow(4px 4px 0 #e8e2d4);transform:rotate(8deg);}
  .tag{font-weight:800;font-size:18px;text-transform:uppercase;letter-spacing:.05em;background:#0a0d12;color:#c89a3f;display:inline-block;padding:6px 14px;border-radius:8px;margin-top:8px;position:relative;z-index:3;}
  .speech{position:absolute;top:18px;right:240px;background:#15191f;border:2.5px solid #e8e2d4;border-radius:14px;padding:6px 12px;font-weight:800;font-size:14px;transform:rotate(-4deg);box-shadow:3px 3px 0 0 #000;z-index:4;}
</style></head><body>
<div class="wrap">
  <div class="wm">SUI<br><span class="red">COMBATS</span></div>
  <div class="speech">LFG! ⚔</div>
  <div class="fighter"><img src="../assets/items/dark_cursed_greatsword.png" alt=""></div>
  <div class="tag">PvP · ON CHAIN · 95/5</div>
</div>
</body></html>
