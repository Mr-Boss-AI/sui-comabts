<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#15191f;font-family:"Poppins";color:#e8e2d4;}
  .wrap{padding:18px;display:grid;grid-template-columns:repeat(8,1fr);gap:12px;}
  .ic{border:2px solid #e8e2d4;border-radius:10px;background:#15191f;box-shadow:3px 3px 0 0 #000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;text-align:center;gap:4px;}
  .ic svg{width:28px;height:28px;}
  .name{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8a8474;}
</style></head><body>
<div class="wrap">
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#e8e2d4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19l4-4M14 4l6 6-9 9H5v-6z"/><path d="M16 6l2 2"/></svg><span class="name">Sword</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#e8e2d4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/></svg><span class="name">Shield</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#e8e2d4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13c0-5 4-9 8-9s8 4 8 9v3H4z"/><path d="M9 16v3M15 16v3"/></svg><span class="name">Helm</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#b53d2c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-5-7-11a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 6-7 11-7 11z"/></svg><span class="name">HP</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#3a6a9a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></svg><span class="name">DEX</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#7a3a8a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.5 5.5l2.8 2.8M15.7 15.7l2.8 2.8M5.5 18.5l2.8-2.8M15.7 8.3l2.8-2.8"/></svg><span class="name">INT</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#c89a3f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8"/></svg><span class="name">END</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#e8e2d4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span class="name">Timer</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#e8e2d4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18l-2 12H5z"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/></svg><span class="name">Market</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#e8e2d4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12v6a6 6 0 0 1-12 0z"/><path d="M18 5h2v3a3 3 0 0 1-3 3M6 5H4v3a3 3 0 0 0 3 3M9 21h6M12 16v5"/></svg><span class="name">Trophy</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#e8e2d4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9h10v8H5z"/><path d="M15 11h4l2 2v4h-6"/><path d="M6 5h8l1 2"/></svg><span class="name">Tavern</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#e8e2d4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-5 4-7 8-7s7 2 8 7"/></svg><span class="name">Character</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#e8e2d4" stroke-width="2.4" stroke-linecap="round"><path d="M5 5l14 14M19 5L5 19"/></svg><span class="name">Close</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#5a8a3a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5 11-12"/></svg><span class="name">Check</span></div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#e8e2d4" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg><span class="name">Chevron</span></div>
  <div class="ic"><img src="../assets/sui-mark.svg" alt="" style="width:28px;height:28px;"><span class="name">SUI</span></div>
</div>
</body></html>
