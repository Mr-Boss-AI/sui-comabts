<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#15191f;}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:20px;}
  .sw{border:2px solid #e8e2d4;border-radius:12px;overflow:hidden;box-shadow:4px 4px 0 0 #000;}
  .chip{height:64px;}
  .meta{background:#15191f;padding:6px 10px;border-top:2px solid #e8e2d4;text-align:center;}
  .name{font-weight:800;font-size:11px;display:block;}
  .hex{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:10px;color:#8a8474;display:block;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#15191f"></div><div class="meta"><span class="name">Gray 50</span><span class="hex">F3F4F6</span></div></div>
  <div class="sw"><div class="chip" style="background:#2c333d"></div><div class="meta"><span class="name">Gray 100</span><span class="hex">E5E7EB</span></div></div>
  <div class="sw"><div class="chip" style="background:#3a4250"></div><div class="meta"><span class="name">Gray 200</span><span class="hex">D1D5DB</span></div></div>
  <div class="sw"><div class="chip" style="background:#9a958a"></div><div class="meta"><span class="name">Gray 400</span><span class="hex">9CA3AF</span></div></div>
  <div class="sw"><div class="chip" style="background:#8a8474"></div><div class="meta"><span class="name">Gray 600</span><span class="hex">4B5563</span></div></div>
  <div class="sw"><div class="chip" style="background:#3a3f48"></div><div class="meta"><span class="name">Gray 800</span><span class="hex">1F2937</span></div></div>
</div>
</body></html>
