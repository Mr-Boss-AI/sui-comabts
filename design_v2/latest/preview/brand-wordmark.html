<!doctype html>
<html><head><meta charset="utf-8"><title>Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#c89a3f;font-family:"Poppins";color:#e8e2d4;height:100%;}
  .wrap{padding:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;min-height:200px;}
  .wm{font-family:"Slackey";font-size:88px;line-height:1;color:#e8e2d4;letter-spacing:0;text-align:center;}
  .wm .red{color:#b53d2c;-webkit-text-stroke:3px #e8e2d4;}
  .tag{font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.12em;color:#e8e2d4;}
</style></head><body>
<div class="wrap">
  <div class="wm">SUI<span class="red">COMBATS</span></div>
  <div class="tag">Meme-coin brawl. Real SUI on the line.</div>
</div>
</body></html>
