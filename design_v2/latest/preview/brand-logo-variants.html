<!doctype html>
<html><head><meta charset="utf-8"><title>Logo Variants</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#15191f;font-family:"Poppins";color:#e8e2d4;}
  .wrap{padding:20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .lk{border:2px solid #e8e2d4;border-radius:12px;box-shadow:4px 4px 0 0 #000;display:flex;align-items:center;justify-content:center;padding:20px;height:130px;}
  .wm{font-family:"Slackey";font-size:36px;line-height:1;}
  .wm .red{color:#b53d2c;}
  .stack{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .stack .a{font-family:"Slackey";font-size:42px;line-height:.9;}
  .stack .b{font-family:"Slackey";font-size:30px;color:#b53d2c;line-height:.9;}
  .yellow{background:#c89a3f;}
  .black{background:#0a0d12;color:#c89a3f;}
  .black .red{color:#b53d2c;}
  .lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#8a8474;text-align:center;margin-top:6px;}
</style></head><body>
<div class="wrap">
  <div><div class="lk"><div class="wm">SUI<span class="red">COMBATS</span></div></div><div class="lbl">Horizontal · white</div></div>
  <div><div class="lk yellow"><div class="stack"><span class="a">SUI</span><span class="b">COMBATS</span></div></div><div class="lbl">Stacked · yellow card</div></div>
  <div><div class="lk black"><div class="wm">SUI<span class="red">COMBATS</span></div></div><div class="lbl">Reverse · black</div></div>
</div>
</body></html>
