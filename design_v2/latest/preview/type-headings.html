<!doctype html>
<html><head><meta charset="utf-8"><title>Heading Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#15191f;font-family:"Poppins",sans-serif;color:#e8e2d4;}
  .wrap{padding:20px;display:flex;flex-direction:column;gap:6px;}
  .row{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid #2c333d;padding:4px 0;}
  .meta{font-family:"JetBrains Mono",monospace;font-size:10px;color:#8a8474;flex-shrink:0;width:120px;}
  .h{margin:0;letter-spacing:-0.02em;line-height:1.1;}
</style></head><body>
<div class="wrap">
  <div class="row"><span class="meta">H1 · 64 / 800</span><h1 class="h" style="font-size:48px;font-weight:800">Stake a wager.</h1></div>
  <div class="row"><span class="meta">H2 · 48 / 800</span><h2 class="h" style="font-size:36px;font-weight:800">Mint your fighter</h2></div>
  <div class="row"><span class="meta">H3 · 36 / 700</span><h3 class="h" style="font-size:28px;font-weight:700">Loadout saved on chain</h3></div>
  <div class="row"><span class="meta">H4 · 24 / 700</span><h4 class="h" style="font-size:22px;font-weight:700">Round 3 — Lock in your zones</h4></div>
  <div class="row"><span class="meta">H5 · 20 / 700</span><h5 class="h" style="font-size:18px;font-weight:700">Marketplace listings</h5></div>
</div>
</body></html>
