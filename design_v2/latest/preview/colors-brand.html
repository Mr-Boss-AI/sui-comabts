<!doctype html>
<html><head><meta charset="utf-8"><title>Brand Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#15191f;}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:20px;}
  .sw{border:2px solid #e8e2d4;border-radius:12px;overflow:hidden;box-shadow:4px 4px 0 0 #000;}
  .chip{height:84px;display:flex;align-items:flex-end;padding:10px 14px;}
  .meta{background:#15191f;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-top:2px solid #e8e2d4;}
  .name{font-weight:800;font-size:13px;letter-spacing:-0.01em;}
  .hex{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:11px;color:#8a8474;}
  .lbl{font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#c89a3f"><span class="lbl" style="color:#e8e2d4">Hype / Select / Reward</span></div><div class="meta"><span class="name">Meme Yellow</span><span class="hex">#c89a3f</span></div></div>
  <div class="sw"><div class="chip" style="background:#b53d2c"><span class="lbl" style="color:#e8e2d4">Attack / Wager / Danger</span></div><div class="meta"><span class="name">Meme Red</span><span class="hex">#b53d2c</span></div></div>
  <div class="sw"><div class="chip" style="background:#0a0d12"><span class="lbl" style="color:#c89a3f">Text / Outline / Ink</span></div><div class="meta"><span class="name">Brand Black</span><span class="hex">#e8e2d4</span></div></div>
  <div class="sw"><div class="chip" style="background:#15191f"><span class="lbl" style="color:#e8e2d4">Canvas / Card surface</span></div><div class="meta"><span class="name">White</span><span class="hex">#15191f</span></div></div>
  <div class="sw"><div class="chip" style="background:#15191f"><span class="lbl" style="color:#e8e2d4">Card surface (warm)</span></div><div class="meta"><span class="name">Paper</span><span class="hex">#15191f</span></div></div>
  <div class="sw"><div class="chip" style="background:#0a0d12"><span class="lbl" style="color:#e8e2d4">Page background</span></div><div class="meta"><span class="name">Bg Page</span><span class="hex">#0a0d12</span></div></div>
</div>
</body></html>
